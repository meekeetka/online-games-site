<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Game — Game Zone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <a class="logo" href="index.html">Game Zone</a>
    <nav class="breadcrumbs" aria-label="Breadcrumb">
      <a href="index.html">Home</a>
      <span class="sep" aria-hidden="true">/</span>
      <span id="crumb-title">Game</span>
    </nav>
  </header>

  <main class="container game-page">
    <div class="game-page-header">
      <div class="game-meta">
        <span id="game-category-tag" class="game-category-tag hidden"></span>
      </div>
      <h1 id="game-title">Loading&hellip;</h1>
    </div>

    <div class="player-wrap">
      <div id="player-ratio" class="player-ratio">
        <iframe
          id="game-frame"
          class="game-iframe"
          title="Game"
          allow="fullscreen; autoplay; gamepad *"
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
        ></iframe>
        <div class="player-toolbar">
          <a id="newtab-btn" class="toolbar-btn" href="#" target="_blank" rel="noopener noreferrer" title="Open in new tab" aria-label="Open in new tab">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
            </svg>
          </a>
          <button id="fullscreen-btn" class="toolbar-btn" title="Fullscreen" aria-label="Fullscreen">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <p id="fallback" class="fallback hidden">
      This game could not be embedded.
      <a id="fallback-link" href="#" target="_blank" rel="noopener noreferrer">Open in a new tab &rarr;</a>
    </p>

    <p id="game-desc" class="game-desc"></p>

    <div class="game-actions">
      <a class="btn btn-ghost" href="index.html">&larr; Back to catalog</a>
    </div>
  </main>

  <footer class="site-footer">
    <small>© 2025 Game Zone</small>
  </footer>

  <script src="game.js"></script>
</body>
</html>
