<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Game Zone — Free HTML5 Games</title>
  <meta name="description" content="25 free HTML5 games right in your browser. Board games, puzzles, arcades, cards, word and quiz games." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <a class="logo" href="index.html">Game Zone</a>
    <p class="tagline">25 free HTML5 games</p>
  </header>

  <main class="container">
    <section class="hero">
      <p class="hero-label">Free · No registration · No download</p>
      <h1>Play right now</h1>
      <p class="hero-sub">Board games, puzzles, arcades, cards and quizzes — all in your browser.</p>
    </section>

    <div class="filters" id="filters" role="group" aria-label="Filter by category">
      <button class="filter-btn active" data-cat="all">All</button>
      <button class="filter-btn" data-cat="strategy">Strategy</button>
      <button class="filter-btn" data-cat="board">Board</button>
      <button class="filter-btn" data-cat="puzzle">Puzzle</button>
      <button class="filter-btn" data-cat="cards">Cards</button>
      <button class="filter-btn" data-cat="arcade">Arcade</button>
      <button class="filter-btn" data-cat="word">Word</button>
      <button class="filter-btn" data-cat="quiz">Quiz</button>
    </div>

    <section id="featured-section" aria-label="Featured games">
      <div class="section-header">
        <h2 class="section-title">⭐ Featured</h2>
        <span class="section-count" id="featured-count"></span>
      </div>
      <div id="featured-grid" class="featured-grid" aria-live="polite"></div>
    </section>

    <section id="all-section" style="margin-top:2rem" aria-label="All games">
      <div class="section-header">
        <h2 class="section-title">All Games</h2>
        <span class="section-count" id="all-count"></span>
      </div>
      <div id="grid" class="game-grid" aria-live="polite"></div>
    </section>
  </main>

  <footer class="site-footer">
    <small>© 2025 Game Zone</small>
    <small>Games courtesy of <a href="https://playpager.com" target="_blank" rel="noopener">playpager.com</a> — free to embed per their terms.</small>
  </footer>

  <script src="app.js"></script>
</body>
</html>
